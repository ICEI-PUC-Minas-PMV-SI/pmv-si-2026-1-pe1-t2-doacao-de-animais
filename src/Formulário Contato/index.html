<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>formulario</title>
</head>

<body>

    <header>
<img src="header.jpeg" alt="">

    </header>


    <h1 id="titulo">Contato</h1>
    <h3 id="subtitulo">Sua opinião, comentários, reclamações, elogios, e sugestões serão sempre bem-vindas. Para enviá-los, preencha o formulário abaixo. Tentaremos responder o mais rapidamente possível.</h3>
        
    <h4>Envie Seus Comentários</h4>
    
    <form action="#" method="post">
        <fieldset class="grupo">
            <div class="campo">
                <label for="inome">Nome:</label>
                <input type="text" id="inome" name="nome" required placeholder="Digite seu nome">
            </div>

            <div class="campo">
                <label for="iemail">Email:</label>
                <input type="email" id="iemail" name="email" required placeholder="Digite seu e-mail"> <!-- name era "senha" -->
            </div>

            <div class="campo">
                <label for="icidade">Cidade:</label>
                <input type="text" id="icidade" name="cidade" required placeholder="Digite o nome da sua cidade">
            </div>

            <div class="campo">
                <label for="ibairro">Bairro:</label>
                <input type="text" id="ibairro" name="bairro" placeholder="Digite seu bairro (opcional)">
            </div>

            <div class="campo">
                <label for="itelefone">Telefone:</label>
                <input type="tel" id="itelefone" name="telefone" required placeholder="Digite seu telefone"> <!-- type="int" não existe -->
            </div>
        </fieldset>
        
         <div class="campo">
                <label for="icomentario">Comentário:</label>
                <input type="text" id="icomentario" name="comentario" placeholder="Digite seu comentario">
            </div>

        <input type="submit" value="Enviar" class="bottom"> <!-- Adicionei class="bottom" pro CSS pegar -->
    </form>

<footer>
    <img src="footer-pets.jpeg" alt="rodape">


</footer>

</body>
</html>
